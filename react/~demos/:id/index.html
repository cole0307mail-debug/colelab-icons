<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="ie=edge">
<link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/wangxingkang/pictures@latest/imgs/sensoro-design.svg">
<link rel="stylesheet" href="/colelab-icons/react/umi.0be76cec.css">
<script>
(function() {
  var vueLink = '/colelab-icons/vue/';
  function mount() {
    var search = document.querySelector('.dumi-default-header-search')
      || document.querySelector('[class*="header-search"]')
      || document.querySelector('input[placeholder*="搜索"]')?.parentElement;

    if (!search || !search.parentElement) return false;
    if (document.getElementById('dumi-vue-doc-link')) return true;

    var a = document.createElement('a');
    a.id = 'dumi-vue-doc-link';
    a.href = vueLink;
    a.textContent = 'Vue 文档';
    a.style.marginLeft = '10px';
    a.style.padding = '4px 10px';
    a.style.border = '1px solid #d9d9d9';
    a.style.borderRadius = '6px';
    a.style.fontSize = '12px';
    a.style.textDecoration = 'none';
    a.style.color = 'inherit';
    a.style.whiteSpace = 'nowrap';

    search.parentElement.appendChild(a);
    return true;
  }

  if (!mount()) {
    var timer = setInterval(function() {
      if (mount()) clearInterval(timer);
    }, 500);
    setTimeout(function() { clearInterval(timer); }, 10000);
  }
})();
      </script>
<script src="/colelab-icons/react/preload_helper.8768172c.js"></script>
</head>
<body>
<div id="root"></div>
<script src="/colelab-icons/react/umi.6b8fb917.js"></script>
</body>
</html>
