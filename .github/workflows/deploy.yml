name: Deploy Docs

env:
  NODE_OPTIONS: --max-old-space-size=6144

on:
  push:
    branches: [master, main]

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate + Build
        run: pnpm generate && pnpm build

      - name: Build docs
        run: pnpm site

      - name: Prepare deploy directory
        run: |
          rm -rf deploy-dist
          mkdir -p deploy-dist/react deploy-dist/vue
          cp -R dist/. deploy-dist/react/
          cp -R docs-vue/.vitepress/dist/. deploy-dist/vue/
          cat > deploy-dist/index.html <<'HTML'
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Cole Icons Docs</title>
              <style>body{font-family:system-ui;padding:40px}a{display:block;margin:8px 0}</style>
            </head>
            <body>
              <h1>Cole Icons Docs</h1>
              <a href="./vue/">Vue Docs</a>
              <a href="./react/">React Docs</a>
            </body>
          </html>
          HTML

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-dist
